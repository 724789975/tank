apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: jwt-to-user-channel
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.lua
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            function envoy_on_request(request_handle)
              local metadata = request_handle:streamInfo():dynamicMetadata():get("envoy.filters.http.jwt_authn")
              
              if not metadata then
                return
              end
              
              local claims = metadata.payload
              if not claims then
                return
              end
              
              local userId = claims.userId or claims.sub or ""
              if userId == "" then
                return
              end
              
              local ver = claims.ver or "v1"
              local exp = claims.exp or 0
              local iat = claims.iat or 0
              
              local user_channel = string.format(
                '{"ver":"%s","exp":%s,"userId":"%s","iat":%s}',
                ver, exp, userId, iat
              )
              
              request_handle:headers():add("user-channel", user_channel)
            end
