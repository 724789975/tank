syntax = "proto3";
option go_package = "homepage";
package homepage;

import "proto/common.proto";

message RoleInfo {
    int32 level      = 1;
    int64 experience = 2;
}

message GetRoleInfoReq {
}

message GetRoleInfoRsp {
    common.ErrorCode code = 1;
    string           msg  = 2;
    message Data {
        RoleInfo roleInfo = 1;
    }
    Data data = 3;
}

message UpdateRoleExpReq {
    string userId   = 1;
    int64  addExp   = 2;
}

message UpdateRoleExpRsp {
    common.ErrorCode code = 1;
    string           msg  = 2;
    message Data {
        RoleInfo roleInfo = 1;
    }
    Data data = 3;
}