syntax = "proto3";

import "proto/user_center.proto";
package user_center_service;

option go_package = "user_center_service";

service UserCenterService {
    //ตวยผ
    rpc login(user_center.LoginReq) returns (user_center.LoginRsp){};

    //ป๑ศกำรปงะลฯข
    rpc user_info(user_center.UserInfoReq) returns (user_center.UserInfoRsp){};

    //ฒโสิตวยผ
    rpc test_login(user_center.TestLoginReq) returns (user_center.TestLoginRsp){};

    //Google OAuth callback
    rpc google_oauth_callback(user_center.GoogleOAuthCallbackReq) returns (user_center.GoogleOAuthCallbackRsp){};

    //Google OAuth สฺศจย๋ฝปปป
    rpc google_oauth_exchange(user_center.GoogleOAuthExchangeReq) returns (user_center.GoogleOAuthExchangeRsp){};

    //Googleตวยผ
    rpc google_login(user_center.GoogleLoginReq) returns (user_center.GoogleLoginRsp){};
}
