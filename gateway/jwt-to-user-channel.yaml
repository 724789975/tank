apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: jwt-to-user-channel
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.lua
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            -- Pure Lua Base64 decoder (compatible with Lua 5.1)
            local function base64_decode(data)
              local b64 = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"
              local temp = {}
              local val = 0
              local bits = 0
              
              for i = 1, #data do
                local char = data:sub(i, i)
                if char == "=" then break end
                local idx = b64:find(char)
                if idx then
                  val = val * 64 + (idx - 1)
                  bits = bits + 6
                  if bits >= 8 then
                    bits = bits - 8
                    local byte_val = math.floor(val / (2^bits))
                    val = val % (2^bits)
                    table.insert(temp, string.char(byte_val))
                  end
                end
              end
              
              return table.concat(temp)
            end
            
            -- Base64URL decoding helper
            local function base64url_decode(data)
              data = data:gsub("-", "+"):gsub("_", "/")
              local padding = #data % 4
              if padding > 0 then
                data = data .. string.rep("=", 4 - padding)
              end
              return base64_decode(data)
            end

            -- Simple JSON field extractor
            local function extract_field(str, field_name)
              local pattern = '"' .. field_name .. '":%s*"?([^",}]*)"?'
              local match = str:match(pattern)
              if match then
                return match:match('^%s*(.-)%s*$')
              end
              return nil
            end

            function envoy_on_request(request_handle)
              -- Only process JWT for /api/1.0/public/route/* paths
              local path = request_handle:headers():get(":path") or ""
              if not path:find("^/api/1.0/public/route/") then
                return  -- Skip JWT processing for other paths
              end
              
              local auth_header = request_handle:headers():get("Authorization")
              
              -- No Authorization header - reject request
              if not auth_header then
                request_handle:logWarn("Missing Authorization header for route path")
                return
              end
              
              local bearer_prefix = "Bearer "
              local token = nil
              
              if auth_header:sub(1, #bearer_prefix) == bearer_prefix then
                token = auth_header:sub(#bearer_prefix + 1)
              else
                token = auth_header
              end
              
              token = token:match("^%s*(.-)%s*$")
              
              if not token or #token == 0 then
                return
              end
              
              local parts = {}
              for part in token:gmatch("[^%.]+") do
                table.insert(parts, part)
              end
              
              if #parts < 2 then
                request_handle:logWarn("Invalid JWT format: not enough parts")
                return
              end
              
              local payload_b64 = parts[2]
              local payload_decoded = base64url_decode(payload_b64)
              
              -- Extract fields directly
              local ver = extract_field(payload_decoded, "ver") or "v1"
              local exp_str = extract_field(payload_decoded, "exp") or "0"
              local iat_str = extract_field(payload_decoded, "iat") or "0"
              local userId = extract_field(payload_decoded, "userId") or extract_field(payload_decoded, "sub") or ""
              
              -- Validate userId is not empty
              if userId == "" then
                request_handle:logWarn("JWT missing userId/sub claim")
                return
              end
              
              -- Build user-channel JSON
              local user_channel = string.format(
                '{"ver":"%s","exp":%s,"userId":"%s","iat":%s}',
                ver,
                exp_str,
                userId,
                iat_str
              )
              
              request_handle:headers():add("user-channel", user_channel)
            end
