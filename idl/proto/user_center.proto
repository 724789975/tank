syntax = "proto3";
option go_package = "user_center";
package user_center;

import "proto/common.proto";


message LoginReq {
	string kid      = 1;
	string macKey   = 2;
}

message TapInfo {
	string avatar  = 1;
	string gender  = 2;
	string name    = 3;
	string openid  = 4;
	string unionid = 5;
}

message TapBaseInfo {
	TapInfo data    = 1;
	int64   now     = 2;
	bool    success = 3;
}

message LoginRsp {
	common.ErrorCode code       = 1;
	string           msg        = 2;
	TapInfo          tapInfo    = 3;
}

message UserInfoReq {
	string openid = 1;
}

message UserInfoRsp {
	common.ErrorCode code = 1;
	string           msg  = 2;
	message Data {
		TapInfo tapInfo = 1;
	}
	Data data = 3;
}

message TestLoginReq {
	TapInfo tapInfo = 1;
}



message TestLoginRsp {
	common.ErrorCode code = 1;
	string           msg  = 2;
	message Data {
		TapInfo tapInfo = 1;
	}
	Data data = 3;
}

message GoogleOAuthCallbackReq {
	string state   = 1;
	string iss     = 2;
	string code    = 3;
	string scope   = 4;
	string authuser = 5;
	string prompt  = 6;
}

message GoogleOAuthCallbackRsp {
	common.ErrorCode code = 1;
	string           msg  = 2;
	message Data{
		string code = 1;
	}
	Data data = 3;
}

message GoogleOAuthExchangeReq {
	string code = 1;
	string codeVerifier = 2;
}

message GoogleOAuthExchangeRsp {
	common.ErrorCode code = 1;
	string           msg  = 2;
	message Data{
		string token = 1;
		TapInfo tapInfo = 2;
	}
	Data data = 3;
}

message GoogleLoginReq {
	string openid  = 1;
	string avatar  = 2;
	string gender  = 3;
	string name    = 4;
	string unionid = 5;
}

message GoogleLoginRsp {
	common.ErrorCode code = 1;
	string           msg  = 2;
	TapInfo          tapInfo = 3;
}
