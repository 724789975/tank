syntax = "proto3";
option go_package = "auction";
package auction;

import "google/protobuf/any.proto";
import "proto/common.proto";

// 基础消息类型
message PingReq {
    string message = 1;
}

message PingRsp {
    common.ErrorCode code = 1;
    string msg = 2;
}

// 订单信息
message OrderInfo {
    string item_id = 1;          // 道具ID
    int32 quantity = 2;          // 道具数量
    int64 price = 3;             // 价格
}

// 交易记录数据
message TransactionRecord {
  string transaction_id = 1;     // 交易ID
  string buy_order_id = 2;       // 买单ID
  string sell_order_id = 3;      // 卖单ID
  string item_id = 4;            // 道具ID
  string item_info = 5;          // 道具信息
  int32 quantity = 6;            // 交易数量
  int64 price = 7;               // 交易价格
  int64 tax = 8;                 // 税费金额
  int64 transaction_time = 9;    // 交易时间
}

// 按时间查询交易记录数据
message TimeTransactionRecord {
  string transaction_id = 1;      // 交易ID
  string item_id = 2;            // 道具ID
  string item_info = 3;          // 道具信息
  int32 quantity = 4;            // 交易数量
  int64 price = 5;               // 交易价格
  int64 tax = 6;                 // 税费金额
  int64 transaction_time = 7;    // 交易时间
  string trade_direction = 8;    // 交易方向（buy/sell）
  string status = 9;             // 交易状态
  int64 final_price = 10;         // 最终价格
  int32 final_quantity = 11;      // 最终数量
  string user_id = 12;            // 用户ID
}

// 交易历史数据
message TransactionHistoryData {
  repeated TransactionRecord records = 1;    // 交易记录列表
}

// 按时间获取交易记录数据
message TransactionsByTimeData {
  int32 total = 1;              // 总记录数
  int32 page = 2;               // 当前页码
  int32 page_size = 3;          // 每页数量
  repeated TimeTransactionRecord records = 4;    // 交易记录列表
}

// 出售协议 - 用户出售物品
message SellReq {
    string item_id = 1;          // 物品ID
    int64 price = 2;             // 出售价格
    int32 quantity = 3;          // 出售数量
    string item_info = 4;        // 道具信息（JSON字符串）
    string idempotent_id = 5;    // 幂等ID，用于防止重复请求
}

// 出售响应数据结构 - 包含完整订单信息
message SellData {
    string order_id = 1;         // 订单ID
    string item_id = 2;          // 道具ID
    int32 quantity = 3;          // 道具数量
    int64 price = 4;             // 出售价格
    string item_info = 5;        // 道具信息（JSON字符串）
    int64 create_time = 6;       // 创建时间
}

message SellRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    SellData data = 3;           // 复合信息
}

// 求购协议 - 用户发布求购需求
message BuyReq {
    string item_id = 1;          // 物品ID
    int64 price = 2;             // 求购价格
    int32 quantity = 3;          // 求购数量
    string idempotent_id = 4;    // 幂等ID，用于防止重复请求
}

// 求购响应数据结构 - 包含完整订单信息
message BuyData {
    string order_id = 1;         // 订单ID
    string item_id = 2;          // 道具ID
    int32 quantity = 3;          // 道具数量
    int64 price = 4;             // 求购价格
    int64 create_time = 5;       // 创建时间
}

message BuyRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    BuyData data = 3;            // 复合信息
}

// 取消出售协议 - 取消已发布的出售
message CancelSellReq {
    string order_id = 1;         // 订单ID
    string idempotent_id = 2;    // 幂等ID，用于防止重复取消
}

// 取消出售响应数据结构
message CancelSellData {
    bool success = 1;            // 取消是否成功
}

message CancelSellRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    CancelSellData data = 3;     // 复合信息
}

// 取消求购协议 - 取消已发布的求购
message CancelBuyReq {
    string order_id = 1;         // 订单ID
    string idempotent_id = 2;    // 幂等ID，用于防止重复取消
}

// 取消求购响应数据结构
message CancelBuyData {
    bool success = 1;            // 取消是否成功
}

message CancelBuyRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    CancelBuyData data = 3;      // 复合信息
}

// 查看自己所有出售道具协议
message GetMySellsReq {
}

// 查看出售道具响应数据
message GetMySellsRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    repeated SellData data = 3;  // 出售订单列表
}

// 查看自己所有求购道具协议
message GetMyBuysReq {
}

// 查看求购道具响应数据
message GetMyBuysRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    repeated BuyData data = 3;   // 求购订单列表
}

// 获取道具出售求购详情协议
message GetItemAuctionInfoReq {
    repeated string item_ids = 1; // 道具ID列表
}

// 道具拍卖信息
message ItemAuctionInfo {
    string item_id = 1;              // 道具ID
    repeated OrderInfo sells = 2; // 出售列表（最多5条）
    repeated OrderInfo buys = 3;   // 求购列表（最多5条）
}

// 获取道具出售求购详情响应
message GetItemAuctionInfoRsp {
    common.ErrorCode code = 1;   // 错误码
    string msg = 2;              // 错误信息
    repeated ItemAuctionInfo data = 3; // 道具拍卖信息列表
}

// 获取交易历史请求
message GetTransactionHistoryReq {
  string order_id = 1;               // 订单ID
}

// 获取交易历史响应
message GetTransactionHistoryRsp {
  common.ErrorCode code = 1;                                  // 错误码
  string msg = 2;                                   // 错误信息
  TransactionHistoryData data = 3;                  // 交易历史数据
}

// 按时间获取交易记录请求
message GetTransactionsByTimeReq {
  int64 start_time = 1;          // 开始时间戳（秒）
  int64 end_time = 2;            // 结束时间戳（秒）
  int32 page = 3;                // 页码，从1开始
  int32 page_size = 4;           // 每页数量
}

// 按时间获取交易记录响应
message GetTransactionsByTimeRsp {
  common.ErrorCode code = 1;      // 错误码
  string msg = 2;                 // 错误信息
  TransactionsByTimeData data = 3; // 按时间获取交易记录数据（包含总记录数、当前页码、每页数量）
}